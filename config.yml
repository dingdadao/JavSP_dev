# 注意：本文件仅作为首次启动时的默认初始化配置。
# 程序启动后会将这些默认值写入 SQLite 数据库，后续请通过 Web 管理界面
#（http://<host>:5001/config）修改配置。Web 界面保存的配置会覆盖本文件中的值。
scanner:
  ignored_id_pattern:
  - (144|240|360|480|720|1080)[Pp]
  - '[24][Kk]'
  - \w+2048\.com
  - Carib(beancom)?
  - '[^a-z\d](f?hd|lt)[^a-z\d]'
  input_directory: /Volumes/data/download
  filename_extensions:
  - .3gp
  - .avi
  - .f4v
  - .flv
  - .iso
  - .m2ts
  - .m4v
  - .mkv
  - .mov
  - .mp4
  - .mpeg
  - .rm
  - .rmvb
  - .ts
  - .vob
  - .webm
  - .wmv
  - .strm
  - .mpg
  ignored_folder_name_pattern:
  - ^\.
  - ^#recycle$
  - ^#整理完成$
  - ^#不要扫描$
  minimum_size: 232MiB
  skip_nfo_dir: false
  manual: false
  clear_skipped_on_rescan: true
network:
  proxy_server: null
  proxy_free:
    avsox: https://avsox.click
    javbus: https://www.seedmm.help
    javdb: https://javdb.com
    javlib: https://www.y78k.com
  retry: 3
  timeout: PT10S
  site_cookies:
    javdb:
      list_mode: h
      theme: auto
      locale: zh
      over18: '1'
crawler:
  selection:
    normal:
    - javdb
    - arzon
    - airav
    - mgstage
    - prestige
    - javbus
    fc2:
    - fc2
    - avsox
    - javdb
    - javmenu
    - fc2ppvdb
    cid:
    - fanza
    getchu:
    - dl_getchu
    gyutto:
    - gyutto
  required_keys:
  - cover
  - title
  hardworking: true
  respect_site_avid: true
  fc2fan_local_path: null
  sleep_after_scraping: PT1S
  use_javdb_cover: fallback
  normalize_actress_name: true
summarizer:
  move_files: true
  path:
    output_folder_pattern: /Volumes/data/goodStuff/JapanMovie/{actress}/{num}
    basename_pattern: '{num}'
    file_basename_pattern: '[{num}]'
    length_maximum: 250
    length_by_byte: true
    max_actress_count: 10
    hard_link: false
  title:
    remove_trailing_actor_name: true
  duplicate_file:
    strategy: auto_select
    size_threshold: 1048576
    auto_resolve_duplicate: 1
  default:
    title: '#未知标题'
    actress: '#未知女优'
    series: '#未知系列'
    director: '#未知导演'
    producer: '#未知制作商'
    publisher: '#未知发行商'
  nfo:
    basename_pattern: '[{num}]'
    title_pattern: '{title}'
    fnos_compatible: true
    custom_genres_fields:
    - '{genre}'
    - '{censor}'
    custom_tags_fields:
    - '{genre}'
    - '{censor}'
  censor_options_representation:
  - 无码
  - 有码
  - 打码情况未知
  cover:
    basename_pattern: poster
    highres: true
    add_label: false
    crop:
      on_id_pattern:
      - ^\d{6}[-_]\d{3}$
      - ^ARA
      - ^SIRO
      - ^GANA
      - ^MIUM
      - ^HHL
      engine: null
  fanart:
    basename_pattern: fanart
  extra_fanarts:
    enabled: true
    concurrent_downloads: 3
    max_download_count: 6
  checker_default_path: /Volumes/data/goodStuff/JapanMovie/
  checker_nfo_title_pattern: '{num} - {title}'
translator:
  engine:
    name: localai
    url: http://localhost:1234
    api_key: ''
    model: hy-mt2-7b
    max_retry: 3
    retry_delay: 2
  fields:
    title: true
    plot: true
other:
  interactive: true
  check_update: true
  auto_update: false
