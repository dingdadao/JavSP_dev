# 机场订阅
proxy-providers:
  Airport1:
    url: ""
    type: http
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: 直连


# 节点信息
proxies:
  - {name: 直连, type: direct, udp: true}

# 全局配置
port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
tproxy-port: 7894
allow-lan: true
bind-address: "*"
ipv6: true
unified-delay: true
tcp-concurrent: true
log-level: warning
find-process-mode: 'off'
# interface-name: en0
global-client-fingerprint: chrome
keep-alive-idle: 600
keep-alive-interval: 15
disable-keep-alive: false
profile:
  store-selected: true
  store-fake-ip: true

# 控制面板
external-controller: 0.0.0.0:9090
secret: ""
external-ui: "/etc/nikki/run/ui"
external-ui-name: zashboard
external-ui-url: "https://github.com/Zephyruso/zashboard/archive/refs/heads/gh-pages.zip"

# 嗅探
sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  force-domain:
    - "+.v2ex.com"
  skip-domain:
    - "rule-set:private_domain,cn_domain"
    - "dlg.io.mi.com"
    - "+.push.apple.com"
    - "+.apple.com"
    - "+.wechat.com"
    - "+.qpic.cn"
    - "+.qq.com"
    - "+.wechatapp.com"
    - "+.vivox.com"
    - "+.oray.com"
    - "+.sunlogin.net"
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"

# 入站
tun:
  enable: true
  # system/gvisor/mixed
  stack: System
  dns-hijack: ["any:53", "tcp://any:53"]
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true

# DNS模块
dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  respect-rules: true
  enhanced-mode: redir-host
  # fake-ip-range: 198.18.0.1/16
  # fake-ip-filter-mode: blacklist
  # fake-ip-filter:
  #   - "rule-set:private_domain,cn_domain"
  #   - "+.services.googleapis.cn"
  #   - "+.xn--ngstr-lra8j.com"
  #   - "time.*.com"
  #   - "+.pool.ntp.org"
  #   - "+.ntp.tencent.com"
  #   - "+.ntp1.aliyun.com"
  #   - "+.ntp.ntsc.ac.cn"
  #   - "+.cn.ntp.org.cn"
  default-nameserver:
    - 223.5.5.5
  proxy-server-nameserver:
    - https://efd0e8b4-0d77-4f5d-b267-b4ec9307f1fc.dingdadao.dpdns.org/feer-go
  # namesever尽量用运营商提供的DNS
  nameserver:
    - 58.20.127.238
    - 119.29.29.29

# 公共锚点

pr: &pr {type: select, proxies: [🚀 默认代理, 🔯 香港故转, 🔯 日本故转, 🔯 新加坡故转, 🔯 韩国故转, 🔯 台湾故转, 🔯 美国故转, 🔯 英国故转, ♻️ 香港自动, ♻️ 日本自动, ♻️ 美国自动, ♻️ 新加坡自动, ♻️ 韩国自动, ♻️ 自动选择, ♻️ 英国自动, ♻️ 台湾自动, 🇨🇳 中国移动, 🇭🇰 香港, 💩 台湾, 🇯🇵 日本, 🇰🇷 韩国, 🇸🇬 新加坡, 🇺🇲 美国, 🇬🇧 英国, 🇫🇷 法国, 🇦🇺 澳大利亚, 🇮🇪 爱尔兰, 🇳🇱 荷兰, 🇰🇵 朝鲜, 🌐 全部节点, 直连]}
proxy-groups:
  - {name: 🚀 默认代理, type: select, proxies: [🔯 香港故转, 🔯 日本故转, 🔯 新加坡故转, 🔯 韩国故转, 🔯 台湾故转, 🔯 美国故转, 🔯 英国故转, ♻️ 香港自动, ♻️ 日本自动, ♻️ 美国自动, ♻️ 新加坡自动, ♻️ 韩国自动, ♻️ 自动选择, ♻️ 英国自动, ♻️ 台湾自动, 🇨🇳 中国移动, 🇭🇰 香港, 💩 台湾, 🇯🇵 日本, 🇰🇷 韩国, 🇸🇬 新加坡, 🇺🇲 美国, 🇬🇧 英国, 🇫🇷 法国, 🇦🇺 澳大利亚, 🇮🇪 爱尔兰, 🇳🇱 荷兰, 🇰🇵 朝鲜, 🌐 全部节点, 直连]}
  - {name: 📹 YouTube, <<: *pr}
  - {name: 🍀 Google, <<: *pr}
  - {name: 👨🏿‍💻 GitHub, <<: *pr}
  - {name: 🐬 OneDrive, <<: *pr}
  - {name: 🪟 Microsoft, <<: *pr}
  - {name: 🎵 TikTok, <<: *pr}
  - {name: 📲 Telegram, <<: *pr}
  - {name: 🎥 NETFLIX, <<: *pr}
  - {name: ✈️ Speedtest, <<: *pr}
  - {name: 🌈 OpenAI, <<: *pr}
  - {name: 💶 PayPal, <<: *pr}
  - {name: 🐦 TuiTe, <<: *pr}
  - {name: 🌻 CustomProxy, <<: *pr}
  - {name: 🇯🇵 日本刮削, <<: *pr}
  - {name: 🍎 Apple, <<: *pr}
  - {name: 🐟 漏网之鱼, <<: *pr}

  # ------------------------------
  # 国家/地区分组
  # ------------------------------
  - {name: 🇨🇳 中国移动, type: select, include-all: true, filter: "(?i)(中国移动|移动|CMCC)"}
  - {name: 🇭🇰 香港, type: select, include-all: true, filter: "(?i)(香港|HK|HKG)"}
  - {name: 💩 台湾, type: select, include-all: true, filter: "(?i)(台湾|TW|TPE)"}
  - {name: 🇯🇵 日本, type: select, include-all: true, filter: "(?i)(日本|JP|Japan)"}
  - {name: 🇰🇷 韩国, type: select, include-all: true, filter: "(?i)(韩国|KR|Korea)"}
  - {name: 🇸🇬 新加坡, type: select, include-all: true, filter: "(?i)(新加坡|SG|Singapore)"}
  - {name: 🇺🇲 美国, type: select, include-all: true, filter: "(?i)(美国|US|America)"}
  - {name: 🇬🇧 英国, type: select, include-all: true, filter: "(?i)(英国|UK)"}
  - {name: 🇫🇷 法国, type: select, include-all: true, filter: "(?i)(法国|FR)"}
  - {name: 🇦🇺 澳大利亚, type: select, include-all: true, filter: "(?i)(澳大利亚|AU|Australia)"}
  - {name: 🇮🇪 爱尔兰, type: select, include-all: true, filter: "(?i)(爱尔兰|IE|Ireland)"}
  - {name: 🇳🇱 荷兰, type: select, include-all: true, filter: "(?i)(荷兰|NL|Netherlands)"}
  - {name: 🇰🇵 朝鲜, type: select, include-all: true, filter: "(?i)(朝鲜|KP|平壤|Pyongyang)"}

  # ------------------------------
  # 自动测速组
  # ------------------------------
  - {name: ♻️ 香港自动, type: url-test, include-all: true, interval: 300, tolerance: 20, filter: "(?i)(香港|HK|HKG)"}
  - {name: ♻️ 日本自动, type: url-test, include-all: true, interval: 300, tolerance: 20, filter: "(?i)(日本|JP|Japan)"}
  - {name: ♻️ 美国自动, type: url-test, include-all: true, interval: 300, tolerance: 20, filter: "(?i)(美国|US|America)"}
  - {name: ♻️ 新加坡自动, type: url-test, include-all: true, interval: 300, tolerance: 20, filter: "(?i)(新加坡|SG|Singapore|狮城)"}
  - {name: ♻️ 韩国自动, type: url-test, include-all: true, interval: 300, tolerance: 20, filter: "(?i)(韩国|KR|Korea|IEPL|IPLC|SK)"}
  - {name: ♻️ 台湾自动, type: url-test, include-all: true, interval: 300, tolerance: 20, filter: "(?i)(台湾|TW|TPE)"}
  - {name: ♻️ 英国自动, type: url-test, include-all: true, interval: 300, tolerance: 20, filter: "(?i)(英国|UK)"}
  - {name: ♻️ 自动选择, type: url-test, include-all: true, tolerance: 20, interval: 300, filter: "^((?!(直连)).)*$"}


  # ------------------------------
  # 故障转 fallback
  # ------------------------------
  - {name: 🔯 香港故转, type: fallback, include-all: true, interval: 300, tolerance: 20, filter: "(?i)(香港|HK|HKG)"}
  - {name: 🔯 日本故转, type: fallback, include-all: true, interval: 300, tolerance: 20, filter: "(?i)(日本|JP|Japan)"}
  - {name: 🔯 新加坡故转, type: fallback, include-all: true, interval: 300, tolerance: 20, filter: "(?i)(新加坡|SG|Singapore|狮城)"}
  - {name: 🔯 韩国故转, type: fallback, include-all: true, interval: 300, tolerance: 20, filter: "(?i)(韩国|KR|Korea)"}
  - {name: 🔯 台湾故转, type: fallback, include-all: true, interval: 300, tolerance: 20, filter: "(?i)(台湾|TW|TPE)"}
  - {name: 🔯 美国故转, type: fallback, include-all: true, interval: 300, tolerance: 20, filter: "(?i)(美国|US|America)"}
  - {name: 🔯 英国故转, type: fallback, include-all: true, interval: 300, tolerance: 20, filter: "(?i)(英国|UK)"}

  # ------------------------------
  # 综合组
  # ------------------------------
  - {name: 🏠 自动选择, type: url-test, include-all: true, interval: 300, tolerance: 20, filter: "^((?!(直连)).)*$"}
  - {name: 🌐 全部节点, type: select, include-all: true}



# 规则匹配
